log:
  level: INFO

api:
  insecure: false
  dashboard: false

providers:
  docker:
    exposedByDefault: false
    network: web
  file:
    filename: /dynamic.yml

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

serversTransport:
  forwardingTimeouts:
    responseHeaderTimeout: "300s"
